name: BetterKeyboard
options:
  bundleIdPrefix: is.solberg.lyklabord
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Jökull Sólberg's personal Apple Developer team: provisions the App
    # Group (group.is.solberg.lyklabord — shared learning store) and the
    # iCloud.is.solberg.lyklabord CloudKit container. Team IDs ship inside
    # every app binary; not a secret.
    DEVELOPMENT_TEAM: RDC8539AWM
    CODE_SIGN_STYLE: Automatic

packages:
  Learning:
    path: Packages/Learning
  LemmaCore:
    path: Packages/LemmaCore
  Sync:
    path: Packages/Sync
  Lexicon:
    path: Packages/Lexicon
  TypeEngine:
    path: Packages/TypeEngine
  KeyboardKit:
    path: Packages/KeyboardKit
    # NOTE: KeyboardKit switched to a closed-source binary (XCFramework) +
    # LicenseKit distribution as of v10.0, which conflicts with this repo's
    # locked decision that the free tier stays MIT/auditable and the
    # extension ships zero network code (LicenseKit performs license
    # validation). 9.9.1 is the last tag that ships full MIT Swift source
    # with no license-key machinery — vendored in-repo (see
    # Packages/KeyboardKit, research/keyboardkit-v10-delta.md) rather than
    # resolved via SPM against the upstream tag, so we're no longer at the
    # mercy of the remote repo's tags. We own this fork going forward; there
    # is no `swift package update` for KeyboardKit in this project's future.

targets:
  BetterKeyboard:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Lyklaborð
        # CFBundleName defaults to PRODUCT_NAME (BetterKeyboard) and leaks
        # into iOS surfaces (iPhone Storage, some dialogs) — brand it.
        CFBundleName: Lyklaborð
        # xcodegen writes literal 1.0/1 defaults otherwise — these make the
        # bundle version track the target settings (dead70b bump et seq).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Standard-crypto-only (CryptoKit AES-GCM for user-data protection):
        # mass-market exemption; satisfies the export-compliance question.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # DEV-MODE session pipeline: expose the app's iCloud Documents folder
        # in the Files app so dev-mode typing sessions the app copies there
        # (App/RecordingStore.swift) are user-visible AND user-deletable —
        # the OTA export path, no servers (see docs/PRIVACY.md "Þróunarhamur").
        # Document-scope-public is what makes the container a top-level folder
        # in Files > iCloud Drive. Same container as CloudKit (iCloud.is.solberg.lyklabord).
        NSUbiquitousContainers:
          iCloud.is.solberg.lyklabord:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: Lyklaborð
            NSUbiquitousContainerSupportedFolderLevels: Any
    entitlements:
      path: App/BetterKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.is.solberg.lyklabord
        # CloudKit: APP ONLY — the keyboard extension must never gain
        # network-capable entitlements (PLAN architecture invariant).
        com.apple.developer.icloud-container-identifiers:
          - iCloud.is.solberg.lyklabord
        # iCloud Documents (ubiquity) — APP ONLY, same container. Lets the app
        # write dev-mode sessions into the user's own iCloud Drive for OTA
        # pickup on the Mac. The keyboard extension keeps ZERO iCloud/network
        # entitlements. NOTE: adding the ubiquity capability to the App ID may
        # require one `xcodebuild -allowProvisioningUpdates` (or an Xcode
        # "Signing & Capabilities" refresh) so automatic signing regenerates
        # the provisioning profile — CI sim builds (CODE_SIGNING_ALLOWED=NO)
        # ignore entitlements entirely and are unaffected.
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.is.solberg.lyklabord
        com.apple.developer.icloud-services:
          - CloudKit
          # CloudDocuments is what actually runs iCloud Drive document sync
          # for the ubiquity container (dev-mode session export, RecordingStore).
          # Without it the app gets a ubiquity URL and writes locally, but
          # nothing uploads and the Mac-side Mobile Documents mirror never
          # materializes.
          - CloudDocuments
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.solberg.lyklabord
        PRODUCT_NAME: BetterKeyboard
        MARKETING_VERSION: "0.1.0"
        # Bumped 1→2 with the CloudDocuments entitlement: iCloud Drive only
        # re-reads NSUbiquitousContainers on a bundle-version change.
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    preBuildScripts:
      # Stamp the engine git commit into App/BuildInfo.swift before the Compile
      # Sources phase so session manifests (App/RecordingStore.swift) carry the
      # exact build the recorder ran on. BuildInfo.swift is a committed source
      # already in this target's file list; the script overwrites it IN PLACE
      # and only when the value changed, so it doesn't churn git or force a
      # rebuild every time. `basedOnDependencyAnalysis: false` makes it run on
      # every build; it degrades gracefully to "unknown" when git is absent
      # (source tarball) so a signing-free CI sim build never fails on it.
      - name: Stamp engine commit
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          OUT="$SRCROOT/App/BuildInfo.swift"
          if COMMIT="$(cd "$SRCROOT" && git rev-parse --short HEAD 2>/dev/null)"; then
            if [ -n "$(cd "$SRCROOT" && git status --porcelain 2>/dev/null)" ]; then
              COMMIT="${COMMIT}+dirty"
            fi
          else
            COMMIT="unknown"
          fi
          NEW="    static let engineCommit = \"${COMMIT}\""
          # Rewrite only the value line, and only if it changed.
          if ! grep -qF "$NEW" "$OUT" 2>/dev/null; then
            /usr/bin/sed -i '' -E "s|^    static let engineCommit = \".*\"|${NEW}|" "$OUT"
            echo "BuildInfo: stamped engineCommit=${COMMIT}"
          fi
    dependencies:
      - target: BetterKeyboardExt
        embed: true
      - package: Learning
        product: Learning
      # App-only by design: the keyboard extension NEVER depends on Sync
      # (zero network code in the extension — architecture invariant).
      - package: Sync
        product: Sync

  BetterKeyboardExt:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: KeyboardExt
      - path: data/is/lemma-is.bin
        buildPhase: resources
      - path: data/en/en.lex
        buildPhase: resources
      - path: data/is/is.lex
        buildPhase: resources
      # Inflection intelligence Stage-B artifacts (PLAN.md "Inflection
      # intelligence"). paradigms.bin is mmap-ed (file-backed, ~0 dirty);
      # governors.json.gz is gunzipped+parsed once at load into a compact
      # (~1-2MB dirty) table. Both are loaded off the first-keystroke path
      # in BetterKeyboardAutocompleteService and are fully optional — a
      # missing resource leaves inflection disabled, never crashes.
      - path: data/is/paradigms.bin
        buildPhase: resources
      - path: data/is/governors.json.gz
        buildPhase: resources
    info:
      path: KeyboardExt/Info.plist
      properties:
        CFBundleName: Lyklaborð
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Required for install (installd rejects keyboard appexes without a
        # display name); also the name shown in Settings > Keyboards.
        CFBundleDisplayName: Lyklaborð
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            RequestsOpenAccess: true
            PrefersRightToLeft: false
            PrimaryLanguage: "is"
    entitlements:
      path: KeyboardExt/BetterKeyboardExt.entitlements
      properties:
        com.apple.security.application-groups:
          - group.is.solberg.lyklabord
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.solberg.lyklabord.keyboard
        PRODUCT_NAME: BetterKeyboardExt
        MARKETING_VERSION: "0.1.0"
        # Keep in lockstep with the app target (App Store requires matching
        # short versions; CFBundleVersion now flows from this setting).
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
    dependencies:
      - package: KeyboardKit
        product: KeyboardKit
      - package: LemmaCore
        product: LemmaCore
      - package: Lexicon
        product: Lexicon
      - package: Learning
        product: Learning
      - package: TypeEngine
        product: TypeEngine

  # --- Last-mile replay rig (PLAN.md testing pyramid tier 3) ------------------
  # Additive-only: neither BetterKeyboard nor BetterKeyboardExt is modified.
  # ReplayHost is a minimal single-TextField app the rig types into; the
  # Lyklaborð keyboard reaches it system-wide (installed by the main app), so
  # ReplayHost deliberately does NOT embed the extension. Rig-only — never
  # shipped to the App Store (SKIP_INSTALL handled per-target).
  ReplayHost:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ReplayRig/ReplayHost
    info:
      path: ReplayRig/ReplayHost/Info.plist
      properties:
        CFBundleDisplayName: ReplayHost
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.solberg.lyklabord.replayhost
        PRODUCT_NAME: ReplayHost
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO

  ReplayRigUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ReplayRig/ReplayRigUITests
    dependencies:
      - target: ReplayHost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.solberg.lyklabord.replayhost.uitests
        PRODUCT_NAME: ReplayRigUITests
        TEST_TARGET_NAME: ReplayHost
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BetterKeyboard:
    build:
      targets:
        BetterKeyboard: all
        BetterKeyboardExt: all
    run:
      config: Debug
    archive:
      config: Release

  # Dedicated rig scheme so the main BetterKeyboard scheme is untouched. The
  # UI-test target is attached here; `xcodebuild test -scheme ReplayRig` builds
  # ReplayHost and runs ReplayRigUITests against it.
  ReplayRig:
    build:
      targets:
        ReplayHost: all
        ReplayRigUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ReplayRigUITests
