name: BetterKeyboard
options:
  bundleIdPrefix: is.lyklabord
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Learning:
    path: Packages/Learning
  LemmaCore:
    path: Packages/LemmaCore
  Sync:
    path: Packages/Sync
  Lexicon:
    path: Packages/Lexicon
  TypeEngine:
    path: Packages/TypeEngine
  KeyboardKit:
    path: Packages/KeyboardKit
    # NOTE: KeyboardKit switched to a closed-source binary (XCFramework) +
    # LicenseKit distribution as of v10.0, which conflicts with this repo's
    # locked decision that the free tier stays MIT/auditable and the
    # extension ships zero network code (LicenseKit performs license
    # validation). 9.9.1 is the last tag that ships full MIT Swift source
    # with no license-key machinery — vendored in-repo (see
    # Packages/KeyboardKit, research/keyboardkit-v10-delta.md) rather than
    # resolved via SPM against the upstream tag, so we're no longer at the
    # mercy of the remote repo's tags. We own this fork going forward; there
    # is no `swift package update` for KeyboardKit in this project's future.

targets:
  BetterKeyboard:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Lyklaborð
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: App/BetterKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.is.lyklabord
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.lyklabord.app
        PRODUCT_NAME: BetterKeyboard
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: BetterKeyboardExt
        embed: true
      - package: Learning
        product: Learning
      # App-only by design: the keyboard extension NEVER depends on Sync
      # (zero network code in the extension — architecture invariant).
      - package: Sync
        product: Sync

  BetterKeyboardExt:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: KeyboardExt
      - path: data/is/lemma-is.bin
        buildPhase: resources
      - path: data/en/en.lex
        buildPhase: resources
      - path: data/is/is.lex
        buildPhase: resources
      # Inflection intelligence Stage-B artifacts (PLAN.md "Inflection
      # intelligence"). paradigms.bin is mmap-ed (file-backed, ~0 dirty);
      # governors.json.gz is gunzipped+parsed once at load into a compact
      # (~1-2MB dirty) table. Both are loaded off the first-keystroke path
      # in BetterKeyboardAutocompleteService and are fully optional — a
      # missing resource leaves inflection disabled, never crashes.
      - path: data/is/paradigms.bin
        buildPhase: resources
      - path: data/is/governors.json.gz
        buildPhase: resources
    info:
      path: KeyboardExt/Info.plist
      properties:
        # Required for install (installd rejects keyboard appexes without a
        # display name); also the name shown in Settings > Keyboards.
        CFBundleDisplayName: Lyklaborð
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            RequestsOpenAccess: true
            PrefersRightToLeft: false
            PrimaryLanguage: "is"
    entitlements:
      path: KeyboardExt/BetterKeyboardExt.entitlements
      properties:
        com.apple.security.application-groups:
          - group.is.lyklabord
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.lyklabord.app.keyboard
        PRODUCT_NAME: BetterKeyboardExt
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
    dependencies:
      - package: KeyboardKit
        product: KeyboardKit
      - package: LemmaCore
        product: LemmaCore
      - package: Lexicon
        product: Lexicon
      - package: Learning
        product: Learning
      - package: TypeEngine
        product: TypeEngine

  # --- Last-mile replay rig (PLAN.md testing pyramid tier 3) ------------------
  # Additive-only: neither BetterKeyboard nor BetterKeyboardExt is modified.
  # ReplayHost is a minimal single-TextField app the rig types into; the
  # Lyklaborð keyboard reaches it system-wide (installed by the main app), so
  # ReplayHost deliberately does NOT embed the extension. Rig-only — never
  # shipped to the App Store (SKIP_INSTALL handled per-target).
  ReplayHost:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ReplayRig/ReplayHost
    info:
      path: ReplayRig/ReplayHost/Info.plist
      properties:
        CFBundleDisplayName: ReplayHost
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.lyklabord.replayhost
        PRODUCT_NAME: ReplayHost
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO

  ReplayRigUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ReplayRig/ReplayRigUITests
    dependencies:
      - target: ReplayHost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.lyklabord.replayhost.uitests
        PRODUCT_NAME: ReplayRigUITests
        TEST_TARGET_NAME: ReplayHost
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BetterKeyboard:
    build:
      targets:
        BetterKeyboard: all
        BetterKeyboardExt: all
    run:
      config: Debug
    archive:
      config: Release

  # Dedicated rig scheme so the main BetterKeyboard scheme is untouched. The
  # UI-test target is attached here; `xcodebuild test -scheme ReplayRig` builds
  # ReplayHost and runs ReplayRigUITests against it.
  ReplayRig:
    build:
      targets:
        ReplayHost: all
        ReplayRigUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ReplayRigUITests
